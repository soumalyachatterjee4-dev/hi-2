<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c0e;
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 900px;
    padding: 60px 40px;
    position: relative;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .projects-list {
    list-style: none;
  }

  .project-item {
    border-top: 0.5px solid #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    cursor: pointer;
    position: relative;
    transition: border-color 0.3s;
  }

  .project-item:last-child { border-bottom: 0.5px solid #1e1e1e; }
  .project-item:hover { border-color: #333; }

  .project-item:hover .project-name {
    color: #fff;
    transform: translateX(8px);
  }

  .project-item:hover .project-tag { opacity: 1; }
  .project-item:hover .project-num { color: #E8500A; }

  .project-num {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #333;
    width: 32px;
    flex-shrink: 0;
    transition: color 0.3s;
  }

  .project-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    color: #2a2a2a;
    letter-spacing: -0.02em;
    transition: color 0.4s ease, transform 0.4s ease;
    flex: 1;
    padding: 0 24px;
    line-height: 1;
  }

  .project-tag {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #555;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: right;
    width: 160px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* Floating preview */
  .preview-card {
    position: fixed;
    width: 340px;
    height: 210px;
    border-radius: 12px;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.9) rotate(-2deg);
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 32px 64px rgba(0,0,0,0.7);
    z-index: 100;
    border: 0.5px solid rgba(255,255,255,0.08);
  }

  .preview-card.visible {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }

  .preview-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .footer-line {
    margin-top: 48px;
    font-size: 11px;
    color: #2a2a2a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>

    </li>
    <li class="project-item" data-index="3">
      <span class="project-num">04</span>
      <span class="project-name">Luminary</span>
      <span class="project-tag">Neon Dark UI</span>
    </li>
    <li class="project-item" data-index="4">

  </ul>
  <p class="footer-line">CodedCabin &mdash; Portfolio &mdash; 2026</p>

const card = document.getElementById('previewCard');
const img = document.getElementById('previewImg');
const items = document.querySelectorAll('.project-item');

let mouseX = 0, mouseY = 0;
let cardX = 0, cardY = 0;
let raf;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  cardX = lerp(cardX, mouseX, 0.12);
  cardY = lerp(cardY, mouseY, 0.12);
  const offsetX = mouseX > window.innerWidth / 2 ? -370 : 30;
  const offsetY = -105;
  card.style.left = (cardX + offsetX) + 'px';
  card.style.top  = (cardY + offsetY) + 'px';
  raf = requestAnimationFrame(animate);
}

animate();

items.forEach((item) => {
  item.addEventListener('mouseenter', () => {
    const idx = parseInt(item.dataset.index);
    img.src = previews[idx];
    card.classList.add('visible');
  });
  item.addEventListener('mouseleave', () => {
    card.classList.remove('visible');
  });
});
</script>
